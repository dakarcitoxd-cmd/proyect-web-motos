<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - MotoWorld</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-bicycle"></i> MotoWorld
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="mb-4">Catálogo de Motos</h1>

    <div class="row mb-4">
      <div class="col-md-3">
        <select class="form-select" id="marca">
          <option>Todas las marcas</option>
          <option>Yamaha</option>
          <option>Honda</option>
          <option>Kawasaki</option>
          <option>Suzuki</option>
          <option>Ducati</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="tipo">
          <option>Todos los tipos</option>
          <option>Deportiva</option>
          <option>Cruiser</option>
          <option>Urbana</option>
          <option>Adventure</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="precio">
          <option>Cualquier precio</option>
          <option>Menos de $5,000</option>
          <option>$5,000 - $10,000</option>
          <option>Más de $10,000</option>
        </select>
      </div>
      <div class="col-md-3">
        <button class="btn btn-danger w-100">Filtrar</button>
      </div>
    </div>

    <div class="row g-4" id="catalogo-motos">
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-1">&copy; 2026 MotoWorld. Todos los derechos reservados.</p>
      <p class="mb-0">
        <a href="#" class="text-white me-2"><i class="bi bi-facebook"></i></a>
        <a href="#" class="text-white me-2"><i class="bi bi-instagram"></i></a>
        <a href="#" class="text-white"><i class="bi bi-twitter-x"></i></a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const motos = [
      { nombre: "Yamaha R1", tipo: "Deportiva", precio: 18999, img: "https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=600&h=400&fit=crop", desc: "1000cc, 200 HP, velocidad máxima 299 km/h" },
      { nombre: "Honda Rebel 500", tipo: "Cruiser", precio: 6999, img: "https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=600&h=400&fit=crop", desc: "500cc, ideal para rutas y ciudad" },
      { nombre: "Kawasaki Z400", tipo: "Urbana", precio: 5499, img: "https://images.unsplash.com/photo-1588591795084-1770cb90a128?w=600&h=400&fit=crop", desc: "400cc, ágil y ligera para la ciudad" },
      { nombre: "Ducati Panigale V2", tipo: "Deportiva", precio: 21999, img: "https://images.unsplash.com/photo-1558980664-10a1f2b8b3b6?w=600&h=400&fit=crop", desc: "955cc, diseño italiano y potencia brutal" },
      { nombre: "Suzuki V-Strom 650", tipo: "Adventure", precio: 8999, img: "https://images.unsplash.com/photo-1558981359-219d6364c9c8?w=600&h=400&fit=crop", desc: "650cc, perfecta para aventuras off-road" },
      { nombre: "Harley-Davidson Iron 883", tipo: "Cruiser", precio: 11999, img: "https://images.unsplash.com/photo-1558980663-3685c1d673c4?w=600&h=400&fit=crop", desc: "883cc, clásica y poderosa" },
      { nombre: "Yamaha MT-07", tipo: "Urbana", precio: 7999, img: "https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=600&h=400&fit=crop", desc: "689cc, torque increíble para la calle" },
      { nombre: "Kawasaki Versys 1000", tipo: "Adventure", precio: 13999, img: "https://images.unsplash.com/photo-1558981359-219d6364c9c8?w=600&h=400&fit=crop", desc: "1000cc, cómoda para rutas largas" },
    ];

    function mostrarMotos(lista) {
      const contenedor = document.getElementById("catalogo-motos");
      contenedor.innerHTML = lista.map(m => `
        <div class="col-md-4 col-lg-3">
          <div class="card shadow-sm h-100">
            <img src="${m.img}" class="card-img-top" alt="${m.nombre}" height="200" style="object-fit: cover;">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${m.nombre}</h5>
              <span class="badge bg-danger mb-2 align-self-start">${m.tipo}</span>
              <p class="card-text text-muted small">${m.desc}</p>
              <p class="fw-bold text-danger fs-5 mt-auto mb-2">$${m.precio.toLocaleString()}</p>
              <a href="#" class="btn btn-outline-danger w-100">Ver Detalles</a>
            </div>
          </div>
        </div>
      `).join("");
    }

    mostrarMotos(motos);
  </script>
</body>
</html>
