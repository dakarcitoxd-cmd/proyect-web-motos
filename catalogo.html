<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - MotoMundo.pe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a class="header-brand" href="index.html">
        <i class="fa-solid fa-motorcycle"></i> MotoMundo.pe
      </a>
      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="nosotros.html">Nosotros</a></li>
          <li><a href="catalogo.html" class="active">Catálogo</a></li>
          <li><a href="servicio.html">Servicio Técnico</a></li>
          <li><a href="tiendas.html">Nuestras Tiendas</a></li>
          <li><a href="contacto.html">Encuéntranos</a></li>
        </ul>
      </nav>
    </div>
    <div class="nav-right">
      <div class="search-container">
        <input type="text" placeholder="Buscar" id="searchInput">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <a href="#" class="user-icon" aria-label="Perfil">
        <i class="fa-regular fa-user"></i>
      </a>
    </div>
    <div class="mobile-overlay" id="mobileOverlay"></div>
  </header>

  <main class="container py-5">
    <h1 class="mb-4">Catálogo de Motos</h1>

    <section aria-label="Filtros de búsqueda">
      <div class="row mb-4">
        <div class="col-md-3 mb-2 mb-md-0">
          <label for="filtro-tipo" class="form-label fw-semibold">Tipo</label>
          <select class="form-select" id="filtro-tipo">
            <option value="todos">Todos los tipos</option>
            <option value="Deportiva">Deportiva</option>
            <option value="Cruiser">Cruiser</option>
            <option value="Urbana">Urbana</option>
            <option value="Adventure">Adventure</option>
          </select>
        </div>
        <div class="col-md-3 mb-2 mb-md-0">
          <label for="filtro-marca" class="form-label fw-semibold">Marca</label>
          <select class="form-select" id="filtro-marca">
            <option value="todos">Todas las marcas</option>
            <option value="Yamaha">Yamaha</option>
            <option value="Honda">Honda</option>
            <option value="Kawasaki">Kawasaki</option>
            <option value="Suzuki">Suzuki</option>
            <option value="Ducati">Ducati</option>
            <option value="Harley-Davidson">Harley-Davidson</option>
          </select>
        </div>
        <div class="col-md-3 mb-2 mb-md-0">
          <label for="filtro-precio" class="form-label fw-semibold">Precio máximo</label>
          <select class="form-select" id="filtro-precio">
            <option value="0">Cualquier precio</option>
            <option value="5000">Menos de $5,000</option>
            <option value="10000">$5,000 - $10,000</option>
            <option value="20000">$10,000 - $20,000</option>
          </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-danger w-100" id="btn-filtrar">Filtrar</button>
        </div>
      </div>
    </section>

    <section aria-label="Listado de motos">
      <div class="row g-4" id="catalogo-motos"></div>
      <div id="sin-resultados" class="text-center py-5 d-none">
        <i class="bi bi-search text-muted" style="font-size: 3rem;"></i>
        <p class="text-muted fs-5 mt-2">No se encontraron motos con esos filtros.</p>
      </div>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-1">&copy; 2026 MotoMundo.pe. Todos los derechos reservados.</p>
      <p class="mb-0">
        <a href="#" class="text-white me-2" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" class="text-white me-2" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="#" class="text-white" aria-label="Twitter X"><i class="bi bi-twitter-x"></i></a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const menuToggle = document.getElementById("menuToggle");
    const mainNav = document.getElementById("mainNav");
    const overlay = document.getElementById("mobileOverlay");

    function openMenu() {
      mainNav.classList.add("open");
      overlay.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      mainNav.classList.remove("open");
      overlay.classList.remove("show");
      document.body.style.overflow = "";
    }

    menuToggle.addEventListener("click", openMenu);
    overlay.addEventListener("click", closeMenu);

    document.querySelectorAll(".main-nav a").forEach(link => {
      link.addEventListener("click", closeMenu);
    });
  </script>
  <script>
    const motos = [
      { nombre: "Yamaha R1", marca: "Yamaha", tipo: "Deportiva", precio: 18999, img: "https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=600&h=400&fit=crop", desc: "1000cc, 200 HP, velocidad máxima 299 km/h" },
      { nombre: "Honda Rebel 500", marca: "Honda", tipo: "Cruiser", precio: 6999, img: "https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=600&h=400&fit=crop", desc: "500cc, ideal para rutas y ciudad" },
      { nombre: "Kawasaki Z400", marca: "Kawasaki", tipo: "Urbana", precio: 5499, img: "https://images.unsplash.com/photo-1588591795084-1770cb90a128?w=600&h=400&fit=crop", desc: "400cc, ágil y ligera para la ciudad" },
      { nombre: "Ducati Panigale V2", marca: "Ducati", tipo: "Deportiva", precio: 21999, img: "https://images.unsplash.com/photo-1558980664-10a1f2b8b3b6?w=600&h=400&fit=crop", desc: "955cc, diseño italiano y potencia brutal" },
      { nombre: "Suzuki V-Strom 650", marca: "Suzuki", tipo: "Adventure", precio: 8999, img: "https://images.unsplash.com/photo-1558981359-219d6364c9c8?w=600&h=400&fit=crop", desc: "650cc, perfecta para aventuras off-road" },
      { nombre: "Harley-Davidson Iron 883", marca: "Harley-Davidson", tipo: "Cruiser", precio: 11999, img: "https://images.unsplash.com/photo-1558980663-3685c1d673c4?w=600&h=400&fit=crop", desc: "883cc, clásica y poderosa" },
      { nombre: "Yamaha MT-07", marca: "Yamaha", tipo: "Urbana", precio: 7999, img: "https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=600&h=400&fit=crop", desc: "689cc, torque increíble para la calle" },
      { nombre: "Kawasaki Versys 1000", marca: "Kawasaki", tipo: "Adventure", precio: 13999, img: "https://images.unsplash.com/photo-1558981359-219d6364c9c8?w=600&h=400&fit=crop", desc: "1000cc, cómoda para rutas largas" },
    ];

    function mostrarMotos(lista) {
      const contenedor = document.getElementById("catalogo-motos");
      const sinResultados = document.getElementById("sin-resultados");

      if (lista.length === 0) {
        contenedor.innerHTML = "";
        sinResultados.classList.remove("d-none");
        return;
      }

      sinResultados.classList.add("d-none");
      contenedor.innerHTML = lista.map(m => `
        <div class="col-md-4 col-lg-3">
          <div class="card shadow-sm h-100 moto-card">
            <img src="${m.img}" class="card-img-top" alt="${m.nombre}" loading="lazy">
            <div class="card-body d-flex flex-column">
              <h2 class="h5 card-title">${m.nombre}</h2>
              <span class="badge bg-danger mb-2 align-self-start">${m.tipo}</span>
              <p class="card-text text-muted small">${m.desc}</p>
              <p class="fw-bold text-danger fs-5 mt-auto mb-2">$${m.precio.toLocaleString()}</p>
              <button class="btn btn-outline-danger w-100 ver-detalle" data-nombre="${m.nombre}">Ver Detalles</button>
            </div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".ver-detalle").forEach(btn => {
        btn.addEventListener("click", function () {
          alert("Mostrando detalles de: " + this.dataset.nombre);
        });
      });
    }

    function filtrarMotos() {
      const tipo = document.getElementById("filtro-tipo").value;
      const marca = document.getElementById("filtro-marca").value;
      const precioMax = parseInt(document.getElementById("filtro-precio").value);

      const filtradas = motos.filter(m => {
        if (tipo !== "todos" && m.tipo !== tipo) return false;
        if (marca !== "todos" && m.marca !== marca) return false;
        if (precioMax > 0 && m.precio > precioMax) return false;
        return true;
      });

      mostrarMotos(filtradas);
    }

    document.getElementById("btn-filtrar").addEventListener("click", filtrarMotos);

    mostrarMotos(motos);
  </script>
</body>
</html>
